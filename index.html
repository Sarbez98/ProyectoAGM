<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto WebGL</title>
    
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div id="pantalla-inicio">
        <h1 id="titulo-juego">TRAVESÍA ESPACIAL</h1>
        <p id="texto-carga">Cargando... 0%</p>
        <button id="btn-empezar" class="oculto">EMPEZAR</button>
    </div>
    
    <div id="hud-top">
        <span id="hud-nivel">LEVEL 1</span>
        <span id="hud-velocidad">SPEED: 0.5x</span>
        <span id="hud-fps-texto">FPS: <span id="fps">0</span></span> 
        <button id="btn-reiniciar">REINICIAR</button>
    </div>

    <div id="mensaje-centro" class="oculto">
        <h1 id="texto-mensaje">SAFE ZONE</h1>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <script type="module" src="main.js"></script>

</body>
</html>
